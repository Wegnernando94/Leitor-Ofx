<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Analista OFX - Visão Completa</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .negativo { color: #f87171; }
        .positivo { color: #34d399; }
        .card-stats { border-top: 4px solid; }
        .hover\:bg-gray-750:hover { background-color: #2d3748; }
    </style>
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen p-6 font-sans">

    <div class="max-w-7xl mx-auto">
        <header class="mb-8 flex justify-between items-end border-b border-gray-700 pb-4">
            <div>
                <h1 class="text-3xl font-bold text-blue-400 italic">UEX <span class="text-white">Financial Reader</span></h1>
                <p class="text-gray-400 text-sm">Extração de Metadados, Totais e Contagem</p>
            </div>
            <div id="bankInfo" class="text-right text-sm text-blue-300 font-mono italic">
                </div>
        </header>

        <div class="bg-gray-800 p-6 rounded-xl border border-gray-700 mb-8 shadow-lg">
            <input type="file" id="fileInput" accept=".ofx" 
                class="block w-full text-sm text-gray-400 file:mr-4 file:py-2 file:px-4 file:rounded-lg file:border-0 file:text-sm file:font-semibold file:bg-blue-600 file:text-white hover:file:bg-blue-700 cursor-pointer"/>
        </div>

        <div id="statsPanel" class="hidden grid grid-cols-1 md:grid-cols-4 gap-4 mb-8">
            <div class="bg-gray-800 p-5 rounded-lg shadow card-stats border-blue-400">
                <span class="text-gray-400 text-xs uppercase font-bold">Total de Transações</span>
                <div id="totalCount" class="text-2xl font-bold text-blue-400 font-mono">0</div>
            </div>
            <div class="bg-gray-800 p-5 rounded-lg shadow card-stats border-emerald-500">
                <span class="text-gray-400 text-xs uppercase font-bold">Total Créditos (+)</span>
                <div id="totalCredit" class="text-2xl font-bold text-emerald-400">R$ 0,00</div>
            </div>
            <div class="bg-gray-800 p-5 rounded-lg shadow card-stats border-red-500">
                <span class="text-gray-400 text-xs uppercase font-bold">Total Débitos (-)</span>
                <div id="totalDebit" class="text-2xl font-bold text-red-400">R$ 0,00</div>
            </div>
            <div class="bg-gray-800 p-5 rounded-lg shadow card-stats border-gray-400">
                <span class="text-gray-400 text-xs uppercase font-bold">Balanço Líquido</span>
                <div id="netBalance" class="text-2xl font-bold text-gray-100 font-mono">R$ 0,00</div>
            </div>
        </div>

        <div id="transactionContainer" class="hidden">
            <div class="bg-gray-800 rounded-xl border border-gray-700 overflow-hidden shadow-2xl">
                <table class="min-w-full">
                    <thead class="bg-gray-700 text-gray-300">
                        <tr class="text-left text-xs uppercase">
                            <th class="px-6 py-4 w-16 text-center">#</th>
                            <th class="px-6 py-4">Data</th>
                            <th class="px-6 py-4">Descrição</th>
                            <th class="px-6 py-4">ID Transação (FITID)</th>
                            <th class="px-6 py-4 text-right">Valor</th>
                        </tr>
                    </thead>
                    <tbody id="transactionTableBody" class="divide-y divide-gray-700 text-sm"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('fileInput').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = (e) => parseOFXFull(e.target.result);
            reader.readAsText(file);
        });

        function getTagValue(block, tag) {
            const regex = new RegExp('<' + tag + '>([^<\\n\\r]+)', 'i');
            const match = block.match(regex);
            return match ? match[1].trim() : '';
        }

        function parseOFXFull(text) {
            // 1. Metadados do Banco (Incluindo Agência)
            const bankId = getTagValue(text, 'BANKID');
            const branchId = getTagValue(text, 'BRANCHID'); // Extração da Agência
            const acctId = getTagValue(text, 'ACCTID');
            const org = getTagValue(text, 'ORG');

            // Formatação do cabeçalho com Agência
            const branchInfo = branchId ? ` | AGÊNCIA: ${branchId}` : '';
            document.getElementById('bankInfo').innerHTML = 
                `INSTITUIÇÃO: ${org || bankId || 'N/A'}${branchInfo} | CONTA: ${acctId || 'N/A'}`;

            // 2. Extração de Transações
            const transactionRegex = /<STMTTRN>([\s\S]*?)<\/STMTTRN>/g;
            const transactions = [];
            let match;
            
            let totalCredit = 0;
            let totalDebit = 0;

            while ((match = transactionRegex.exec(text)) !== null) {
                const block = match[1];
                const rawAmount = getTagValue(block, 'TRNAMT').replace(',', '.');
                const amount = parseFloat(rawAmount);

                transactions.push({
                    date: getTagValue(block, 'DTPOSTED'),
                    amount: amount,
                    name: getTagValue(block, 'NAME') || getTagValue(block, 'MEMO') || 'Sem Nome',
                    fitid: getTagValue(block, 'FITID')
                });

                if (amount > 0) totalCredit += amount;
                else totalDebit += Math.abs(amount);
            }

            if (transactions.length === 0) {
                alert("Nenhuma transação encontrada no arquivo.");
                return;
            }

            updateUI(transactions, totalCredit, totalDebit);
        }

        function updateUI(data, credit, debit) {
            document.getElementById('statsPanel').classList.remove('hidden');
            document.getElementById('transactionContainer').classList.remove('hidden');

            document.getElementById('totalCount').innerText = data.length;
            document.getElementById('totalCredit').innerText = formatCurrency(credit);
            document.getElementById('totalDebit').innerText = formatCurrency(debit);
            document.getElementById('netBalance').innerText = formatCurrency(credit - debit);

            const tbody = document.getElementById('transactionTableBody');
            tbody.innerHTML = '';

            data.forEach((item, index) => {
                const tr = document.createElement('tr');
                tr.className = "hover:bg-gray-750 transition-colors";
                tr.innerHTML = `
                    <td class="px-6 py-4 text-center text-gray-600 font-bold border-r border-gray-700">${index + 1}</td>
                    <td class="px-6 py-4 text-gray-400 font-mono">${formatDate(item.date)}</td>
                    <td class="px-6 py-4 font-medium text-gray-200">${item.name}</td>
                    <td class="px-6 py-4 text-xs text-gray-500 font-mono">${item.fitid}</td>
                    <td class="px-6 py-4 text-right font-bold ${item.amount < 0 ? 'negativo' : 'positivo'}">
                        ${formatCurrency(item.amount)}
                    </td>
                `;
                tbody.appendChild(tr);
            });
        }

        function formatCurrency(val) {
            return val.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
        }

        function formatDate(raw) {
            if (!raw) return "--/--/--";
            return `${raw.substring(6,8)}/${raw.substring(4,6)}/${raw.substring(0,4)}`;
        }
    </script>
</body>
</html>
